# Deploy API to production server (rafique-api.kat-jr.com)
# Strategy: no build on runner. On server: git pull -> decode .env -> install -> build -> PM2

name: Deploy API

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  SSH_HOST: rafique-api.kat-jr.com
  DEPLOY_PATH: /var/www/html/rafique/api

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy on server (git pull, decode env, install, build, PM2)
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ env.SSH_HOST }} \
            "cd ${{ env.DEPLOY_PATH }} && \
             git pull origin master && \
             ENV_SECRET='${{ secrets.ENV_SECRET }}' node scripts/decode-env.js --to-root && \
             npm install && \
             npx nest build && \
             npm run migration:run && \
             pm2 delete rafique-api 2>/dev/null || true && \
             pm2 start dist/main.js --name rafique-api && \
             pm2 save && \
             pm2 startup || true"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
